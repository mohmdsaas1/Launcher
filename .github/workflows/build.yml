name: Build APK

# يشتغل تلقائيًا كل ما ترفع تغيير على main، أو يدويًا من تبويب Actions بجوالك
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug

      # الـ APK الجاهز يظهر هنا كـ "Artifact" تقدر تنزّله من جوالك
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SimpleLauncher-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
